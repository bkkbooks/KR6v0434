front:
  text: 出定後語序基幼而閒暇獲讀儒之籍以及少長亦閒暇獲讀佛之籍以休曰儒佛之道亦猶是也皆在樹善已然而至其因緣道之義於細席也則豈得無說乎則不能無屬籍也於是乎出定成基乃持此說者且十年所以語人人皆漠假吾長數个以及頒白年天下儒佛之道亦猶儒佛之道是何益嗚呼身之側陋而痡既不能以及人而德焉又限之以大故而無傳乎基也今既三十以長亦不可以不傳也矣所願則傳之其人通邑大都焉及以傳之韓若漢焉韓若漢焉及以傳之胡西焉以傳之釋迦牟尼降神之地使人皆於道有光焉是死不朽雖然何以知非所謂惡慧是則難矣是則待夫明者部索而楔之已延享元年秋八月富永仲基識出定後語目錄教起前後第一戒第十四經說異同第二室娶第十五如是我聞第三肉食第十六須彌諸天世界第四有宗第十七三藏阿毘曇修多羅伽陀第五空有第十八九部十二部方等乘第六南三北七第十九涅槃華嚴二喻第七禪家祖承第二十神通第八曼陀羅氏第二十一地位第九外道第二十二七佛三祗第十佛出朝代第二十三言有三物第十一三教第二十四八識第十二雜第二十五四諦十二因緣六度第十三
