body:
  text: 日東富永仲基造并自譯教起前後第一今且考教起之前後蓋始于外道其立言者凡九十六種皆宗天曰修之因乃上生天是已因果經云太子因入雪山遍扣諸仙欲求何果仙人答言為欲生天乃是衛世師外道在佛前八百年是最久遠其最後出阿羅羅鬱陀羅也蓋二十八天以非非想為極是鬱陀所宗為度無所有而生于此也是本上于阿羅以無所有為極而無所有則本上于識處識處則本上于空處空處則本上于色界空處色界欲界六天皆相加上以成說其實則漠然何知其信否故外道所說以非非想為極釋迦文欲上于此難復以生天勝之於是上宗七佛而離生死相加之以大神變不可思議力而示以其絕難為乃外道服而竺民歸焉是釋迦文之道之成也釋迦文既沒僧祇結集迦葉始集三藏而大眾亦集三藏分為兩部而後復分為十八部然而其言所述以有為宗事皆在名數全無方等微妙之義是所謂小乘也於是文殊之徒作般若以上之其言所述以空為相而事皆方廣是所謂大乘也智度金剛仙二論云如來在此鐵圍山外共文殊及十方佛結集大乘法藏乃是此時大小二乘未有年數前後之說其張大乘者則曰自得道夜至涅般夜常說般若智度論文然論又說迦文初成道事云是時世界主梵天王名式棄及色界諸天等釋提桓因及欲界諸天等皆詣佛所勸請世尊初轉法輪亦是菩薩念本所願及大慈大悲故受請說法諸法甚深者般若波羅密是是故佛說摩訶般若波羅密經乃是其張小乘者則曰從轉法輪經至大涅槃集作四阿含智度論云大迦葉語阿難從轉法輪經至大涅槃集作四阿含增一阿含中阿含長阿含相應阿含是名修跖路法藏乃是是各各命其終始未有年數前後之說也故其仁王般若序云世尊前已說四般若三十年正月說仁王者亦唯泛爾言之非言阿含後正當三十年也然而法界性論說之云十二年說阿含三十年說大品八年說法華是為法華四十餘年之文所轉而云爾其實非也於是法華氏之言興其言云從成正覺來過四十餘年無數方便引導眾生我所說諸經法華最第一但為菩薩不為小乘觀諸法實相是名菩薩行無量義經亦云四十餘年未顯真實種種說法以方便力是可見其託諸四十餘年後而愚法從前諸家亦託諸實相而破從前有空是法華氏乃大乘中別部并從前二乘而斥之者也然而後世學者皆不知之徒宗法華以為世尊真實之說經中最第一者誤矣年數前後之說實昉于法華并吞權實之說亦實昉于法華廣大方便力熒惑古今人士者何限嗚呼孰蔽之者非出定如來不能也解深密經云初小乘中空教後不空亦法華氏之黨也又案三藏之目始起於迦葉而法華文有三藏學者是知法華經出于後又案法華蓋普現之徒作大論遍吉之語可見於是華嚴氏之言興乃託之二七日前說圓滿修多羅以斥從前小乘又譬之日輪之先照諸大山王以斥從前大乘而特作一家經王矣誠加上者之魁也後世或復信此方便而曰此經最上至極頓之頓者亦誤矣舍利弗目連異時異處共入佛法然此會即有舍利弗等五百聲聞祇洹林普光法堂此時並未建立而此文具述之是皆作者方便逗漏處又案華嚴有諸法實相般若波羅密之語是知此經亦出于二經後於是大集泥洹兼部氏之言興乃作為其二經以合大小二乘且以歸重於其涅槃如其云十六年始說大集是暗託般若之前而出二乘中間也且如其說律云如是五部雖各各別異而皆不妨諸佛法界及大涅槃是合五部律之異也然而五部律皆本出于八十誦中後世五師分為五部去佛滅度幾何是知此經後出涅槃亦同手作故言語多相類是則託之佛滅以證此經之出在年數最後又譬之以醍醐以明此經之義最純粹又擧毘尼并戒乘緩急以說大小二乘之并難遠如後世名捃拾教者不知此為兼部氏也案法顯傳云某國小乘學某國大乘學某國兼大小乘此兼云者乃兼部氏也又案哀嘆品以新體伊字譬秘密之藏是知涅槃亦後出於是頓部氏之說興其契經凡二十楞伽其尤也以從前諸經言皆煩重其趣牛毛而迂遠故更立激切語云一切煩惱本來自離不可說斷及與不斷一切眾生皆是一切畢竟不生離諸名字即一切法唯一真心一念不生即是佛不從一地至一地初地乃八地其言直切無復環回說以破從前因陀羅其窮離披為菩提達磨氏其東來以楞伽印眾生心亦可徵焉依於義不依文字終始不說一字實禪家之鼻祖其窮變幻奇怪乃至以乾屎橛語佛性拭瘡疣斥經卷是皆所謂頓部氏也於是秘密曼陀羅金剛手氏之教興六度經云我滅度後令阿難陀受持所說素呾纜藏鄔波離受持所說毘那耶藏迦多衍那受持所說阿毘達磨藏曼殊師利菩薩受持所說大乘般若波羅密多其金剛手菩薩受持所說甚深微妙總持門矣其教云世尊得一切智智為無量眾生廣演分布隨種種趣種種欲性種種方便道宣說一切智智或聲聞乘道或緣覺乘道或大乘道或五通智道或願生天或生人中及龍夜叉乾闥婆乃至說生摩睺羅伽法各各同彼言音住種種威儀而此一切智智道一味又云契經如乳調伏如酪對法如生蘇般若如熟酥總持門如醍醐是可見此教攝諸家以一切智智乃合之其所謂曼陀羅遂以歸重於其所謂毘盧遮那阿字門者也意者此經王最後出不空師云經夾藏于鐵塔數百年龍猛始獲焉然而龍猛所說無一言及焉者唯秘密之號出于龍猛故後世崇奉之至蓋依以為然也是諸教興起之分皆本出于其相加上不其相加上則道法何張乃古今道法之自然也然而後世學者皆徒以謂諸教皆金口所親說多聞所親傳殊不知其中却有許多開合也不亦惜乎經說異同第二大論云佛滅百年阿輸迦王作般闍于瑟大會諸大法師論議異故有別部名字又云佛法過五百歲後各各分別有五百部又婆沙序說云如來滅後四百年初古論作六百年北印度境健駄邏國王每習佛經日請一僧入室說法僧說莫同王用深疑問脇尊者尊者答曰如來去世歲月逾邈弟子部執據聞見為矛盾因問曰諸部立範孰最善乎答曰莫越有宗王曰此部三藏今應結集須召有德共詳議之於是世友等五百人釋三藏凡三十萬頌即大毘婆沙是也大論又云問經說有五道云何言六道答佛去久遠經法流傳五百年後多有別異部部不同或言五道或言六道若說五者於經文廻文說五若說六者於佛經廻文說六又摩訶衍中法華經說有六趣眾生觀諸義意應有六道法顯傳云法顯本求戒律而北天竺諸國皆師師口傳無本可寫是以遠步乃至中天竺於是得一部律是摩訶僧祇眾律復得一部抄律可七千偈是薩婆多眾律亦皆師師口相傳授不書之於文字又云法顯爾時欲寫此經其人云此無經本止口誦耳今以此六者推之是知佛滅久遠人無定說亦無可依憑之籍皆隨意改易口相傳授宜哉一切經說皆不勝其異亦其不可信從如是也禪家之言曰不立文字意豈在此乎意豈在此乎又閱婆娑其解義必擧數說云某故又某故畢竟是無定說也又迦葉波之集三藏大論皆云誦出亦知此但託口誦金剛般若云一切諸佛及諸佛法皆從此經出無量義云我說是經甚深甚深令眾疾成無上菩提故金光明云十方諸佛常念是經大品云一切善法助道法若三乘法若佛法是一切法皆攝入般若波羅密中又云欲學聲聞乘者當學般若欲學緣覺乘者當學般若欲學菩薩乘者當學般若華嚴云一切世間諸群生尠有欲求聲聞道求緣覺者轉轉復少趣大乘者甚難遇趣大乘者猶為易能信是法甚為難法華云我所說諸經法華最第一法鼓云一切空經是有餘說唯有此經是無上說凡如此類何限皆各部自張者之說也又如其勝鬘云摩訶衍出生二乘法如阿耨池出八大河及文殊問云十八及本二皆從大乘出則是大乘以小乘為所目者又如其法華云四十餘年未顯真實則是大乘以小乘為假權者又如其華嚴云佛成道第二七日說圓滿修多羅則是大乘以小乘為後說者其實皆大乘誘小乘之說後世學者不知之有所云云者誤矣余嘗云大小部乘各作經說皆上證之迦文亦方便已昔者秦緩死其長子得其術而醫之名齊于秦緩其二三子者不勝其忌於是各為新奇而託之于父以求勝其兄非不愛其兄也以為不有以異于兄則不得以同于父天下未有以決也他日其東隣之父得緩枕中之書而出以證焉然後長子之術始窮于天下此事出于毛元仁寒檠膚見是則似之如是我聞第三如是我聞我者何後世說者自我也聞者何後世說者傳聞也如是者何後世說者傳聞如是也契經或云阿難登座稱我聞大眾悲號處胎經非也阿難親受如來不當云我聞一時或解之云阿難得道夜生侍佛二十餘年未侍佛時應是不聞亦非也然則既聞之後何以復言聞乎是不通之說也報恩經云阿難作四願所未聞經願佛重說又云佛口密為說又云阿難所不聞經從諸比丘邊聞或有諸天向阿難說處胎經則云佛從金棺出金臂重為說金剛華經則云阿難得法性覺自在王三昧故如來前所說經皆能憶持與親聞無異涅槃經則云我涅槃後阿難所未聞者弘廣菩薩當廣流布吁是何解之不一說長說短要亦不過保護此失可笑經說多佛後五百歲之人所作故經說多五百歲語大論亦云五百歲後各各分別有五百部是也其云佛經初首作何等語者是當時俗說本出于大論涅槃則特撮之已涅槃出實後于大論大論一言不及涅槃故知之後世學者不知之皆徒以謂數萬經說皆阿難所集吁亦何愚也大論云問曰若佛囑累阿難是般若波羅密佛槃涅槃後阿難共大迦葉結集三藏此中何以不說答曰摩訶衍甚深難信難行佛在世時有諸比丘聞摩訶衍不信不解故從坐而起何況佛涅槃後以是故不說又云有人言如摩訶迦葉將諸比丘在耆闍崛山中集三藏佛滅度後文殊尸利彌勒諸大菩薩亦將阿難集是摩訶衍又阿難知籌量眾生志業大小是故不於聲聞人中說摩訶衍說則錯亂無所成辦是可見當時既有此疑夫摩訶衍法當時諸賢聖親聞佛說猶且不能信解後世却有傳是乃可疑且以是言之阿難則面柔人已己獨知至道不說之聲聞人中乃忍默面諛以讚之是何以為佛子是皆不通之說分明飾辭解之者也其實阿難所集則纔阿含數章已說見于下其他則皆後徒所託不啻不出阿難也故又或解之云後時文殊召諸菩薩及大阿羅漢結集大乘法藏各各言某經我從佛聞須菩提言金剛般若我從佛聞故知不局阿難是稍得之然而經說皆後徒所託何在其為諸菩薩大阿羅漢又失之矣又如處胎經云阿難最初出經第一胎化藏第二中陰藏第三摩訶衍方等藏第四戒律藏第五十住菩薩藏第六雜藏第七金剛藏第八佛藏是為經法具足此則為大小二乘一時所出亦如是我聞之極也須彌諸天世界第四須彌樓山之說皆古來梵志所傳迦文特依以說其道其實渾天之說為是然而後世學者徒張之以排他者失佛意矣何則迦文之意本不在此救民之急何暇議其忽微是所謂方便也然而儒氏亦不知之而曰釋迦作須彌其說不合嗚呼迦文豈如儒固然乎仲尼作春秋亦不知日食之為恒是何以解之夫日月推步天官星翁之所掌無害其不知之却以此是非者皆小知人也近世又有取諸橫以合渾天說者其陋益益甚可笑已其諸經論所說有異同者皆異部名字各立一家言者已如其說地之深增含為六十八千由旬俱舍為八十萬由旬起世為六十萬由旬菩薩藏為六十八百千由旬樓炭為八十億由旬光明為十六萬八千由旬是何其無定說又如其說須彌山半長含因本大論為四萬二千由旬對法俱舍為四萬由旬亦何其無定說又如其說四洲之壽長含樓炭俱舍各各不同須彌四寶亦不同又如其說修羅宮起世為須彌東十地為須彌北又如其說地獄婆沙有說有說無復一定或云八熱八寒各有所屬大論則云八寒是八熱眷屬所處名號諸經論無復一定要皆異部異言不必牽合可也又如其說世界建立俱舍水輪在前楞嚴金輪在前又五輪次序空風水金地增含為地水火風金又光音天長含為命盡來生此間增上為相謂言欲至閻浮地觀地形餘經為歿生大梵處漸漸下生至人趣又如其說三災長含起世刀兵飢饉疫病俱舍婆沙刀兵疫病飢饉瑜伽對法飢饉疫病刀兵次序各各不同要皆異部名字無論其難和會又如其說天薩婆多十六經部師十七上座部十八婆沙日月星宿常憍持鬘堅首四天合為三十二種涅槃有四種而大論有三種又如其說四天王宮城樓炭俱舍大論各各不同又如其說三梵因本對法婆沙相去倍高皆有住地俱舍薩婆多合為一處又仁王有十八梵而瓔珞又禪禪有梵王不同他經有一梵王又如其大論以魔王為欲界主梵王為三界主而復以魔醯首羅為三界主又論大千主為初禪梵王華嚴則為魔醯首羅又如其說魔醯首羅為第六天或為色究竟又如其或為梵天那羅延天摩醯首羅一體三分又如其楞嚴八十華嚴先善見後善現而俱舍正理六十華嚴反之又如其論無色界身處婆沙俱舍瑜伽經部成實為無起世增含華嚴仁王化地大眾為有又如其說人非人金光明為結八部又如其說阿修羅佛地論為天對法為鬼正法念經為鬼畜二趣伽陀經為三趣攝又如婆沙云有餘部立阿素洛為六趣非也契經惟說五趣故大論云問經說有五道云何言六道答佛去久遠經法多有別異唯法華經說有六趣義意應然要亦皆異部所命固非一音所演出也獨宋代志磐師解之以三意云一者佛赴機所說不同二者結集部別不同三者傳譯前後不同嗚呼是何妄之甚如為佛赴機而說之是乃妄語亦何示人以毘尼又以為結集部別不同乎是何在其為佛所說經說亦何足取信何其濫也又以為傳譯前後不同乎是譯師亦為難信也夫涅槃之為滅度或為圓寂是則在譯師知解無論其有不同如以其名物度數前後不同解之是何漠然是何足以為說要皆不知之云爾其實不然釋迦譜亦云經變華戎譯人斟酌出經之人各有所受故往往不同已夫史漢延書猶分糅相反況萬里之外千歲之表哉明昔者固宜擇善而從嗚呼亦何妄也如為擇善而從是己自高以出經典者也亦何足以為經典要亦首鼠之說窘于其有不同云爾是實古今一大疑城出定經典出而後始瞭然也世界之說凡五一須彌世界是梵志初說蓋其本也其所謂小千世界中千世界三千大千世界又三千世界外別有十世界者是皆以後加上者也梵網所謂蓮華藏世界者又一層加上之說其廣大則至華嚴世界海而極矣世界之說其實漠然不過以語心理亦何知然否故曰世界隨心起是也三藏阿毘曇修多羅伽陀第五三藏小乘之名出于迦葉大論云佛在世時無三藏名大迦葉等集三藏又云三藏是聲聞法摩訶衍是大乘法法華經云貪着小乘三藏學者是也是龍樹之時三藏之名屬于小乘天台四教依以立藏者得之澄觀師云大乘亦有三藏是自後世之義言有物也又普超經入大乘論謂三乘為三藏者乃別義非此謂也案增一序品云契經一藏律二藏阿毘曇經為三藏出曜經云佛在鹿苑告五比丘此苦本原所未見未聞廣說此法為契經藏佛在羅閱城時迦蘭陀子須陳那出家學道最初犯律故說戒藏佛在毘舍離見跋耆子本末因緣告諸比丘諸諸無五畏恚恨之心者便不墮惡趣亦復不生入地獄中廣說如阿毘曇大論亦云阿難說佛在波羅奈為五比丘說四真諦法是名修妬路藏憂波利說佛在毘舍離須隣那初作淫欲以是因緣初結大罪如是等八十部作毘尼藏阿難說佛在舍婆提城告諸比丘五怖五罪五怨不除不滅此生身心受苦後世墮惡道中如是名為阿毘曇今以是文推之三藏之義可知三藏蓋本一書名皆取類近以贊之其初迦葉等所誦出纔一二三章各各命以類而假別之非如後世有四阿含五部律種種毘曇類分總命以此名者比也其有四阿含五部律種種毘曇者皆後世僧迦之增多也故婆沙云修多羅中多說心法毘尼之中多說戒法阿毘曇中多說慧法而或亦互兼但從多分故名之是知三藏本但一書名各命其所誦以別之其實義亦互兼後世難于阿毘曇獨無經者不知之也婆沙云問誰造此論答佛世尊問若爾此論何故傳言迦多衍尼子造答由彼尊者受持演說廣令流布是故此論名稱歸彼然是佛說是得之矣其實本但命為跋耆者而後尼子等廣益說之如以其後出疑之雖經律亦皆後出也大論云三種法門一者蜫勒門二者阿毘曇門三者空門蜫勒有三百二十萬言佛在世時大迦旃延之所造阿毘曇佛自說諸法義或佛自說法名又云如佛直說世間第一法不說相義一一分別相義是名阿毘曇門今以是文推之阿毘曇蓋解釋相義之名其譯以對法亦以其對法而分別之也其以慧法者亦分別相義是慧法也瑜伽論亦云問答決擇諸法性相故名阿毘曇是得之矣故雖佛說其分別相義者固是阿毘曇非獨概契經也故楞嚴云此阿毘達磨十方薄伽梵一路涅槃門是可見也又十二分教中所謂優波提舍亦同其義大論云佛所說論議經及摩訶迦旃延所解修多羅乃至像法凡夫人如法說亦名優波提舍是知亦同其義後世譯以論義獨以契經屬佛者比之儒家經傳之義其實未為得矣修多羅之義取之線線取之能貫穿何也蓋經說之本體在伽陀故數經說以幾偈涅槃亦云除修多羅及諸戒律其餘有說四句之偈是名伽陀修多羅之為線取之以此貫穿眾偈次第皆依焉佛地論貫攝為義雜集論綴葺云者皆得之矣是修多羅之為線也其譯以契經者亦比之儒家之書義意大別修多羅有總別十二分教中修多羅是與伽陀等對別也一切經藏稱修多羅者總也何也伽陀唯誦讀之便而文理所屬却在修多羅也然則契經之本體在伽陀者何也是乃支那教學必託之操縵詩書易管仲老聃之書皆託言韻語本朝神代古語及祝詞亦皆誦讀之便者三國俱一其致何也口口相傳說誦之際固不能不然且神祇亦所樂也仁王般若云普明王依七佛教法請百法師設百高座一日二日講說般若八千億偈是可見也是知契經之本體實在伽陀而但取之誦護之便也長水師解之云經多立頌略有八義一少字攝多義故二讚嘆者多以偈頌故三為鈍根重說故四為後來之徒故五隨意樂故六易受持故七增明前說故八長行未說故是但第五六義得之其餘皆口辯也案付法藏經云馬鳴於華氏國遊行教化作妙妓樂名賴吒和羅其音清雅宣說若空無我之義時此城中五百王子同時開悟出家為道增一賢愚經云迦葉佛時均提出家少年聲好善巧讚唄人所樂聽毘尼母經云不聽高聲作歌音誦經有五過患同外道歌音說法是知當時經說全託歌音不啻誦讀之便九部十二部方等乘第六九部十二部是共指一切經藏之辭後世或就分大小乘者誤矣何以知之涅槃云聖行品從佛出十二部是言自佛出一切經藏故下文揀異之云出方等又如四相品以九部對方等大乘亦然法華亦云方便品我此九部法隨順眾生說入大乘為本是共指一切經藏未揀異大小之辭可見也故大論有大小乘共九部之說亦足以發又涅槃云小乘無方廣部者是言小乘獨無方等其實砭小乘之言雖小乘亦隨分有方廣後世小乘亦有十二部之說得之是方廣則獨屬之大乘云爾涅槃又云十一部經二乘所持方等部為菩薩所持摩得勒伽論亦云唯方廣部是菩薩藏十一部是聲聞藏亦同方等乃方廣其義無別但就十二部中揀異大乘命之別無其經涅槃云聖行品從佛出十二部經從十二部經出修多羅從修多羅出方等經又云四相品半字者謂九部經毘伽羅論者謂方廣大乘經大論云法華經諸餘方等經何以屬累喜王菩薩普賢經云此方等經是諸佛眼又有方等大乘經典之語又涅槃有大方等大涅槃之語皆讚大之辭非別有其經也又如其華嚴圓覺勝鬘獅子吼皆命以方廣又大論有方廣道人亦皆讚大之辭其義無別後世學者或不知之以是為理方等別立時方等者誤矣聲聞法是二乘小乘菩薩法是大乘大乘菩薩乘之上別有佛乘一乘之說亦一部立言也大乘同性經云所有聲聞法辟支佛法菩薩法諸佛法如是一切諸法皆悉流入毘盧遮那智藏大海智藏大海乃佛第十地名是別有佛乘也楞伽經云無有乘建立我說為一乘引導眾生故分別說諸乘梁譯攝論釋云如來成立正法有三種一小乘二大乘三一乘第三最勝故名善成立是別有一乘也一乘之上復有無乘楞伽經云諸天及梵乘聲聞緣覺乘諸佛如來乘我說此諸乘乃至有心轉諸乘非究竟若彼心滅盡無乘及乘者是別有無乘也是皆一層層加上者之說也又案唐譯攝論釋云菩薩乘即佛乘更無有上是亦一部異言與上不同又案法華經云方便品唯有一乘法無二亦無三又云但以一乘道教他諸菩薩又云為此諸佛子說是大乘經聲聞若菩薩皆成佛無疑是菩薩乘佛乘一乘無有別也又案涅槃經云一切眾生同有佛性皆同一乘是兼家一乘之說也涅槃華嚴二喻第七涅槃經聖行品曰譬如從牛出乳從乳出酪從酪出生酥從生酥出熟酥從熟酥出醍醐醍醐最上佛亦如是從佛出十二部經從十二部經出修多羅從修多羅出方等經從方等經出般若波羅密從般若波羅密出大涅槃猶如醍醐是譬於佛性此喻本由無垢藏王嘆涅槃教最勝佛乃印可喻之以五味以示其最濃也十二部經乃一切經典修多羅乃所謂別部大小未揀異者方等經乃大乘經典就修多羅中揀異之者般若波羅密乃方等中之粹者又兼智慧大涅槃乃大圓寂又為般若之粹皆就其中揀異其粹者是乃其本義然而後世學者皆誤解云十二部是華嚴修多羅是阿含方等是維摩思益等以合之天台大師五教十二部修多羅說既見於上是何限於華嚴阿含且乳粗於酪而華嚴則治于鹿苑是全不合且原經之旨五味濃淡喻教最勝而彼則以合其五教故云取之下劣根性或云取之相生次第亦失其義又華嚴經性起品曰譬如日出先照諸大山王次照大山次照金剛寶山然後普照大地日光不作是念但地有高下故照有先後如來亦然智慧日輪常放光明先照菩薩山王次照緣覺次照善根眾生然後悉照一切眾生如來本不作是念但眾生善根不同故此種種差別此喻本謂如來所說固無淺深唯其初義最第一菩薩眾以上實被之化從斯以下緣覺聲聞隨分頒承皆各各成其德然而求其最高者固不出初說最妙者固不出華嚴是乃經之本旨也然而後世學者復誤解云華嚴第一照阿含第二照方等第三照法華湼槃第四第五照亦以合之天台大師五教夫華嚴之為第一照固不待辯唯阿含之最愚法而為第二照又法華湼槃之最妙者而徒為第四第五照是甚不圓滿是知此喻亦不合且經所列但有四照而彼則合之五時亦失其義要此二喻湼槃則託之終以推醍醐之最醇華嚴則託之始以崇日之先照山王順逆設喻各各妙其教其實胡越之異也天台大師合此二喻以證其五教者亦豈不知之乎偶偶見此喻有足以使人易了解者故假撮以成其趣非以證其說也豈如後世學者固執之以五時全出于此二喻者然乎是則天台大師之本旨也又或後世以疚天台大師者亦非也又如其以有長含四種言論月燈三昧四種修多羅湼槃四菩提因立其四教者亦唯假撮以成之已後世章安等則皆牽強以解其義亦不合也妙玄真記云非以證成亦有此意是則得之神通第八竺人之俗好幻為甚猶之漢人好文凡設教說道者皆必由此以進苟非由此民不信也阿毘曇云不如支佛但以神通以悅眾生不能說法大論云菩薩為眾生故取神通現諸希有奇特令眾生心清淨又云鳥無翅不能高翔菩薩無神通不能隨意教化眾生是也當時諸外道亦皆以幻而進迦文闢而上之亦不能不假之以進大論云有惡邪人懷嫉妬心誹謗言佛智慧不出於人但以幻術惑世斷彼貢高邪慢意故現無量神通無量智慧力又云種種諸物皆能轉變外道輩轉極久不過七日諸佛及弟子轉變自在無有久近寶積經云如來為調伏憍慢眾生故現諸神變是也外道謂之幻佛謂之神通其實一也於是諸弟子傳其道者亦皆託以進其說諸藏所說十分之九皆是已試就十二分教言之阿浮陀達磨之為未曾有是真幻也伊帝越伽之為本事闍陀伽之為本生和伽那之為授記尼陀那之為因緣皆事之幻也毘佛略之為方廣說之幻也是幻居其半矣又大眾部三藏之外集禁咒經地持論四陀羅尼有咒能起咒術有神驗故是亦幻也且諸藏中幻喻偏多何則天竺多見聞且其所好也又如諸弟子託言迦文以立其言互相加上并吞者是亦幻也三十二天六道生滅之說是亦幻也七佛之前上於外道是亦幻也梵天來請教是亦幻也是皆幻也竺人之學實以幻濟道苟不由此以進民亦不信從也余故嘗曰凡天下之僧伽如知佛假乎幻天下之儒史如知儒由乎文則其於道也奚翅一咫一尺矣子熙又嘗與余語云竺人好無量無邊等語其性然漢人之好文辭佶屈語東人之好清介質直語亦其性然又如芥子須彌因陀羅網之喻亦其民心所好如此等喻多有是則原於幻雖漢人亦為山澗平象三耳是則本於文東人則不好此等喻唯作直切語已子熙姓三好名棟明大坂人吾畏友也今也則亡又如因果報應天堂地獄之說本外道所立竺人之性所好也迦文因以利導收其中人以下者更立成佛離相之說以出之層收其中人以上者何則其說固無惡且竺人所好也然而其實則方便也譬之殷人尚鬼殷王諸誥多神多天儒固訾之以譸張者可謂不知類也又佛氏訾儒以無此者亦不知其實則方便也故說道作教振古以來皆必依其俗以利導雖君子亦有未免於斯者竺人之於幻漢人之於文東人之於絞皆其俗然徒以其俗互相喧啄者盡客氣也然而客氣何害苟為為善可也或問得神通法答是本始於觀想大論言之盡矣大論云問曰神通有何次第答曰菩薩離五欲得諸禪有慈悲故為眾生取神通現諸希有奇特之事令眾生心清淨何以故若無希有事不能令多眾生得度菩薩摩訶薩作是念已繫心身中虛空滅麁重色相常取空輕相發大欲精進心智慧籌量心力能擧身未籌量已自知心力大能擧其身譬如學趠常壞色麁重相常修輕空相是時便能飛二者亦能變化諸物令地作水水作地風作火火作風如是諸大皆令轉易令金作瓦礫瓦礫作金如是諸物各能令化變地為水相常修念水令多不復憶念地相是時地相如念即作水如是等諸物皆能變化問曰若爾與一切入有何等異答曰一切入是神通初道先已一切入背捨勝處柔伏其心然後易入神通復次一切入中一身自見地變為水餘人不見神通則不然自見實是水他人亦見實水然而是在東人則難矣何也風氣異也王充論衡言之盡矣如後世禪人以搬水等解神通乃不得已之說也論衡言毒篇云太陽之地人民促急促急之人口舌為毒故楚越之人促急捷疾與人談言口唾射人則人脈胎腫而為創南郡極熱之地其人祝樹樹枯唾鳥鳥墜巫咸能以祝延人之疾愈人之禍者生於江南含烈氣也又案趙氏賓退錄東坡守楊州夢行山間一虎來噬有道士叱虎去明旦一道士投謁曰夜出不至驚否坡咄曰鼠子未欲杖汝背汝謂吾不知汝子夜術乎道士駭而退意者是亦幻也凡古今以夢感人者多皆此術也如迦旃延之化希羅王漢明帝之夢金人唐玄宗之夢空中楚金字肅宗之夢僧誦寶勝如來代宗之夢遊山寺宋徽宗之夢神霄神宗之夢神僧馳馬空中蓋皆是已地位第九聲聞緣覺小乘本無此目俱大乘家貶言以歸重於菩薩也聲聞是從佛聞聲而知之未能瞭然者也華嚴經云上品十善修自利行以智慧狹劣怖三界闕大悲從他聞聲而得解了故名聲聞十地論云從他聞聲而得通達故名聲聞是也又如其地論云我眾生等但有名故說之為聲於聲悟解故曰聲聞又或云以佛道聲令一切聞故曰聲聞者俱非也可見竺土亦有種種解緣覺是有因緣而覺也猶儒云私淑者謂非從佛聞之也是亦獨覺已獨覺是獨自有覺者也大論云辟支佛有二種一名獨覺二名因緣覺楞嚴亦言之又俱舍有二種獨覺部行是師友切磋而所得乃因緣覺麟角是獨學而所得乃獨覺是皆獨覺而未及化他者一也華嚴經云不從他教自覺悟故大悲方便未具足故矣是也涅槃經云獨覺化眾生但現神通終日默然無所宣說瑜伽論云唯現自相為彼說法不發言故示現種種神通境界大論云緣覺之人亦能說一偈兩偈是皆言獨自之義而稍及化他者失之大論又以逢佛世解獨覺亦失之般若初分天帝品有獨覺向獨覺果又慈恩引仁王有獨覺眾又釋迦出世五百獨覺從山中來皆可觀矣又以聞因緣法解緣字亦失之是全不成語菩薩是其身既有覺而又能覺人者也大論云菩提為佛道薩埵為成眾生阿毘曇云自覺覺他名為菩薩是也菩薩乃究竟地位於是為極佛亦菩薩之佛除菩薩外別無有佛故無量義經說菩薩自利德云於如來地堅固不動是其本義也然而善戒經有名字菩薩非義菩薩菩薩旃陀羅無垢稱經有有疾菩薩大論有初心敗壞菩薩瑜伽有菩薩倒執懈怠又有鈍利二根菩薩是皆異部名字其實出於菩薩上層以作說者夫佛乃覺之義聲聞緣覺是既證之身者菩薩是既證之身而亦能及人者佛乃統名也然而法華經云聲聞若菩薩皆成佛無疑又云汝等所行是菩薩道漸漸修學悉當成佛華嚴經云若人根明利有大慈悲心饒益諸眾生為說菩薩道若有無上心決定樂大事為示於佛身說無盡佛法是菩薩上層又別有佛也又如法相於菩薩說修行次第者亦一部名字別制功夫以壓小乘者大乘本無律而其有律者亦然賢首師說之云為隨方便影似引彼故若全異彼難信受故得之又梁攝論謂十信名凡夫菩薩十解名聖人菩薩菩薩何有凡聖之別亦一部名字也聲聞四果是其本也佛十地大乘同性二經就分十地者加上之說也緣覺菩薩本無地位何以知之無量義經云三法四果二道三法煗頂世界第一法也四果聲聞四果也二道緣覺菩薩道也緣覺菩薩二道並稱以是知之其就分十地或說修行次第者皆異部加上之說非本之真也異部加上之說亦至就佛分十地佛十地經大乘同性經三覺起信論及有初心佛大日經而極矣佛是既最上至極何曾有地位初後之別是皆異部加上張其說者也聲聞四果須陀洹之為預流是無異議斯陀含之為一往來猶儒云日月至者阿那含之為不來猶儒云三月不違仁者說者以生死者非也阿羅漢之為不生乃佛之一名猶儒云聖人者四分五分二律共云佛度五人已世間有六羅漢雜集云頓成羅漢及如來是也後來斥以聲聞者異部加上之說也華嚴有十梵行無十信仁王無等覺新金光明勝天王般若及大品但明十地佛地不辯三十心等覺地楞伽妙覺外更立自覺聖智涅槃又有五行而名字品十住在十信後釋義品如例仁王施心瓔珞作捨心華嚴作不退又瓔珞說四十二賢聖不說見修彌勒問論聲聞先斷見惑後斷修惑而菩薩初地頓斷見修道中一切煩惱仁王有三賢十聖有宗有三賢四聖仁王五十一位瓔珞五十二位華嚴四十一位大品四十二位楞嚴五十七位而又云六十聖位地持以初地為見道仁王以四地為初果後世立共單以解之者又仁王教化品三地斷見六地思盡受持品四地斷見七地思盡後世作通別以救之者瑜伽梁攝論皆說聲聞十二住今有宗經典無有涅槃阿羅漢住第十地本業七地寄菩薩仁王七地羅漢八地菩薩梁攝論八地以去寄一乘大論瑜伽唯識菩薩初地已去悲智不同起信則為同修同斷念念雙修賢首師立始終以解之者本說七賢聖成實二十七賢聖本說八十八使成實九十八使本說見道十五心成實十六心大論十地有二種一者共乾慧等二者單歡喜地等楞伽菩薩十地與單同而以八地以上為勝七地以下為共說者云雖是大乘亦兼通教者是皆所謂異部名字各執其說互相加上拗戾者無論其固相齟齬後世學者多方遷就牽強合之者皆非也又如家家等號通之超次是也是本無品位之定以第六品亦可何止三四五俱舍云理應蘇息等者皆臆度之見已又如說不退俱舍為得忍時成實為煗頂以上地論為見道以上佛性論為聲聞苦忍緣覺世第一菩薩十廻向者亦異部名字然又如說超果或為頓出離超中二果或為無之或為賢聖悉無或為回向無超須陀羅漢亦無超越唯斯陀果及那含果有之者亦異部名字然是皆何必會開何必和解又有廻心之說并吞之說已何也有宗自有宗空宗自空宗各自證其道何假乎廻心是則大乘自重也又案華嚴於佛地云初發心時便成正覺而復說諸住其實短長之說已七佛三祇第十迦文所述七佛其名今不可知阿含婆沙合迦文為七者非也何以知之從多知之仁王記普明王事云依過去七佛教法行之大集經亦有從七佛已來之語華嚴又有第七仙大方等陀羅尼經世尊為文殊師利說之云此陀羅尼是過去七佛所造是也又以七佛為修相所逢者立三祇說以出一層也又三祇之後別立百刼者阿含婆沙等也就三祇分之者烏婆塞戒大論等也但立三祇不說修相者起信瑜伽等也是皆異部名字難必和會者也又案摩訶般若云然燈佛記我當來一阿僧祇當作佛金剛般若云我在然燈佛所得授記分明是以然燈為最初第一佛可見金剛又云於然燈佛前得值諸佛是乃加上之說益信之矣法華亦云中間我說然燈佛等皆以方便分別亦足以發之又案楞伽云我爾時作拘留孫拘那含牟尼迦葉佛以為與釋迦非異身亦一家言然又案瑞應經錠光佛授釋迦記為在後九十一刼是與因果本業所謂毘婆尸混而彼則作阿僧祇劫是等皆無一定說又如其於然燈上別有罽那尸棄及又別有釋迦文者而云佛便發願言我於當來作佛如今佛名者亦異部加上之說也又如其華嚴經說十佛佛名經說二十五佛決定毘尼經說三十五佛藥王經說五十三佛亦異部名字然以為迦文前實有之者是為幻所使者已十年行苦樂樹下成正覺是其實也其以三阿僧祇者是幻也而又以無量劫者幻之幻也寶雲經云我為淺近眾生說三阿僧祇劫修行然我實於無量阿僧祇劫所修行也華嚴經云我見釋迦成佛道已經不可思議劫法華經云一切世間天人及阿修羅皆謂今釋迦牟尼佛出釋氏宮去伽耶城不遠坐於道場得阿耨菩提然善男子我實成佛已來無量無邊百千萬億那由佗劫是皆以壽量久成上於三祇劫其實幻之幻也其究亦不能不說一念成佛以破之是頓部氏也已故起信論合之云為懈慢眾生說無量阿僧祇修為怯弱眾生故說一念成佛而實一切菩薩皆經三祇刼是也又如法華八歲龍女南方作佛是言其苟有機不必拘年紀男女乃能成果亦以破從前因陀羅也論者或解之以天女者不知之也又如超劫之說俱舍婆沙云讚底沙超九劫大論云讚弗沙超九而因果經作毘婆尸或云底沙弗沙一佛華嚴頌為別佛而涅槃經則作十二劫遠公疏云三祇中超三劫合為十二非也心地觀經云初僧祇超十二劫第二僧祇超八劫第三祇超十一劫又超九劫四分則云八劫金光明則云十一劫是亦別部名字皆何必和會仲基嘗謂諸經所載佛菩薩諸名必不鑿空出之意者多是太古時人名猶如漢云無懷葛天尊盧之類無復一定說猶如河伯冰夷神荼鬱櫑之類野客叢書蓋皆有所由也如尸棄之名一則釋迦佛初僧祇滿所逢一則七佛第二之佛一則梵王尸棄如觀世音自在一則觀自在菩薩一則觀自在佛一則觀世音自在梵王又如摩醯首羅一則三界主一則藥叉神又如善現一則西方大將一則色界第四禪是皆當時有此名號故說者各各假以言之言有三物第十一般若無佛性語阿含無陀羅尼名金光明三身佛地本業二身楞伽攝論四身華嚴二種十身大論四魔罵意五魔大論三天涅槃四天維摩不可思議金剛無住華嚴法界涅槃佛性般若一切種知金光明法性法華諸法實相是皆其家言各各主張者所謂言有人也諸藏經中傳梵語者多有異而說者云梵之楚夏羅什恒河玄奘殑伽羅什須彌玄奘蘇迷盧如此之類何限皆或指為舊訛夫言語隨世而異音聲與時上下其訛云者非真訛也所謂言有世也維摩云一念知一切法是道場禪要云性定自離即是道場是乃變幻張大之說道場自道場固不與念性相關譬之神道者流以高天原為心體又如增含起世等所謂四食唯段食乃人中所食可食噉者其他更樂食乃衣裳繖蓋香華熏火等念食乃意中所念所想所思惟等識食乃意之所識以識為食是豈皆食之真哉張大食而然譬之俗云喫棒喫棒拳等之喫又如大論以經卷為法身舍利舍利自舍利固不與經卷相關是亦張舍利而然又如其芥子納須彌毛端視寶剎云者是張理而然凡如此類皆張說也凡說仍實而不濫者所謂徧也徧乃實也古今說道者張說殊多學者知之何啻一咫一尺如來之義如而來也本是心體之名善惡未分於類為泛楞伽云如來藏者是善不善因般若云一切眾生皆如來藏是也或就以為成德之名眾妄既止如如而來也於類為磯勝鬘云如來法身不離煩惱藏是如來藏如來藏云一切眾生瞋癡諸煩惱中有如來身是也又如翻鉢剌婆剌拏為自恣者自恣之語本在惡而此局善於類為反凡此五類所謂言有類也凡言有類有世有人謂之言有三物一切語言解以三物者吾教學之立也苟以此求之天下道法一切語言未嘗不錯然而分也故云三物五類立言之紀是也又如盧舍那毘盧舍那新舊有異亦言有世也是本讚迦文之辭遂以為號猶如儒者稱堯以放勛後世學者或依新舊以分三身者非也又如那落捺落亦取音同婆沙正理並無定文後世學者或因字異解者亦非也又如真丹震旦支那指難亦同琳師云東方屬震亦因字生解可笑又如洛又俱底俱大數名翻為億者假以合之也或惑其不合乃解云西國有三種億有四種億億是漢名竺土何曾有三種四種之億亦非也且如阿僧祇積數亦皆異部託言互相變改以牟人已是何必和會又如玄奘師論五種不翻以如薄伽梵具六義者不知者乃云梵語多含實非他方所及是大不然如漢語亦皆多含閱字書可見凡其注云某也某也某也者皆是多含非一義所盡也何止漢語如此方語亦皆多含如謂放蕩者為達曰結亦放蕩一義豈能盡之乎類推可知八識第十二六根六識是其本說勝鬘經猶說六識又攝論云聲聞乘中不說此心名阿賴耶識名阿陀那識由此深細境所攝故亦可見也其有七識八識者皆異部加上之說也瑜伽對法則以七識為主云謂眼等六識界及意界云云第八識意界所攝也深密唯識則以八識為主云非離意識別有餘識唯除別有阿賴耶識是亦異部之言不必和會可也又如楞伽經立八九識因果合說及梁攝論復出一層以阿摩羅為主亦異部之執然何必怪焉奘師不許之云第九是第八異名可謂固矣又釋摩訶衍論有十識大日經有無量心識是心識加上之說也案阿賴耶是藏之義阿陀那及末那是執之義古來譯以心意俱舍云集起名心思量名意了別名識成唯識云藏識說名心思量性名意能了諸境相是說名為識攝大乘論云阿賴耶識以為心體由此為種子意及識轉何因緣故亦說名心由種種法熏習種子所積集故皆可見然而心意是漢語阿賴耶阿陀那是梵語固異其趣有不可得而合者不必當以漢語但會以吾意可也何也阿賴耶是藏阿陀那是執執之與藏俱心之事本於此三者不當分心意如強而分之阿賴耶阿陀耶是意之義阿賴耶識阿陀那識是心之義何也執之藏之乃心之用為活語是意也名之以識乃心之體為死語是心也否則經論亦何以分阿賴耶與阿賴耶識解深密云若菩薩於內於外不見藏住不見熏習不見阿賴耶不見阿賴耶識不見阿陀那不見阿陀那識是也攝論則但作不見本識及阿陀那識是譯家不會意而然惜夫故其或以阿陀那為第八識者亦為得之瑜伽雜集云心者謂蘊界處習氣所熏一切種子阿賴耶識亦名異熟識亦名阿陀那識是也又如楞伽經說阿賴耶以為如來藏云與無明七識共俱是磯而張之義與如來同故或別立菴摩羅以為究竟是加上之說也又案阿賴耶識本外道所說大日經所載三十種妄計可見佛家特因以說之已又案有宗唯以阿賴耶為心意之名別無論說梁攝論云如增一阿含經言於世間喜樂阿梨耶愛阿梨耶習阿梨耶着阿梨耶為滅阿梨耶如來說正法又無性攝論云異熟賴耶乃是要之其當七八識以心意者古來譯人之誤也四諦十二因緣六度第十三雜心苦集道滅大經集苦道滅華嚴苦集滅道皆異部言然謂之諦者乃審諦猶道云者謂處之之道也大經有苦無諦可見苦也者心之煩惱也凡夫着以為樂非真樂也集也者心之無明也癡闇和合於心故有煩惱滅也者滅其無明乃涅槃也道也者除其煩惱乃菩提也遺教經云佛說苦諦實苦不可令樂集真是因更無異因若苦滅者即是因滅因滅故果滅滅苦之道實是真道更無餘道是也是乃四諦本義其說凡夫有苦無諦二乘有諦未達菩薩無共只有真理或說聖諦非苦非集非滅非道思益或說有四種四諦涅槃勝鬘者皆異部名字各各制其義者非本之真也毘曇云癡闇之心體無慧明為無明是正義成實云邪心分別無正慧明名無明是傍添一邪字非正義行者依之而行也依之而行則薰於心識是識也名色者色之名之猶志云者六處者乃六根猶氣云者觸受者觸之受之也愛取有者愛之取之有之也生老死者生之而老死之也無明而生而老死是所謂醉生夢死也一行行皆為因至老死而已現在一因緣是本說也其或以三世羯賴藍等若二世為說者是幻說俱舍大論等又以一念大集若順逆觀阿含若受為觀初者皆異部名字然又或謂十二因緣猶如車輪上下廻轉續而復始是窘于其無明無因老死無果故婆沙云無明有因謂前無明老死有果謂後老死有餘師說無明有因謂前老死老死有果謂後無明涅槃及守護國界經云不正思惟為因無明為緣是皆不知本意所有亦唯摸索漆桶云爾夫佛制十二因緣者說諸業之本出於無明也無明如一除則無行無識乃至無老死謂之般涅槃是猶四諦有集有苦苦滅則道云者四諦是合十二因緣是開其實一也然而諸家分屬聲緣者言之文也故大經云知聖諦有二種聲聞緣覺為中諸佛菩薩為上又云觀十二因緣者四種上上智為佛可見其不局聲緣唯六度獨屬化他是菩薩之業也然亦以局此不可也大品云阿羅漢支佛因六波羅密至彼岸楞伽云人天二乘皆名波羅密是可見也案六度皆古來學者所由行布施禁戒忍辱精進靜慮智慧經說所載皆有所當可見閱婆沙但有四波羅密云六波羅密外國師說意者四度是其本說加以二度加上之說也大品云因般若波羅密五波羅密得波羅密名字大論亦云五波羅密般若中含受是知當時有五波羅密之目加以般若者空家之作也亦知禪那亦禪定家所加今禪人蓋其流派以迦葉者妄也迦葉是頭陀之宗精進家也不合禪人或疾其同於六度中禪那云古德呼佛心宗為禪宗非六度之禪那從單傳直示之字畫也濟北集不立文字之學却從字畫名之可怪且上四度意旨相類是其本也禪那般若獨屬心業不與上類分明是後來所加
