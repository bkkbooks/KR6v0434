body:
  text: 日東富永仲基造并自譯戒第十四大論云十善是尸羅佛不出世世常有之故名舊戒夫善之當為惡之不當為為善則順為惡則逆是天地自然之理固不待於儒佛之教故戒之體本出於惡之逆於事無惡則無戒故大論云若佛出好世則無此戒律如釋迦文雖在惡世十二年中亦無此戒是也僧祇律則云五年以後應制戒律四分律同於大論亦異部言然矣夫戒之體本戒於事但戒身口是其本也而大乘家合防三業而屬之心亦加上之說也戒之體曇無德成實論云無作雜心毗曇云心大乘家云性之色心亦異部言然大論云菩薩以方便力現入五道受五欲引導衆生又云菩薩二種若出家若在家夫菩薩以方廣為道濟度為業其心恢恢其行嶷嶷亦何獨瑟縮乎戒律故於菩薩有戒律有修行次第者皆非本之真也瑜伽地持有四重四十五輕方等經有四重二十八輕梵網經有十重四十八輕凡戒律之嚴實至梵網而極矣是皆影似小乘出其上者也夫佛之有戒律猶如儒之有禮禮也者道之依時而制者身口意皆有禮棄此無儒棄戒律亦無佛故遺教經云於我滅後當尊重珍敬波羅提木叉此則是汝等大師若我住世不異此也是佛所貴於法者唯律為然然而般若家以下至頓家或忽於此皆非其真也故涅槃兼家獨尚戒律誠迦文之意也慧遠師將終耆德請以豉酒治病師曰律無正文請飲米汁師曰日過中矣又請飲蜜和水乃令披律尋之卷未半而終是不以死生變其塞可謂能守律者矣然而其以日既過中米汁且不能飲嗚呼亦陋矣五分律云雖是我語於餘方不清淨者不行無過雖非我語於餘方清淨者不得不行是其真也達者依時與處而制其律又何獨局乎古雖遠師亦豈不知之乎故其制喪儀受業和上同於父母皆三年服若依止師隨喪暫為服是以涅槃法律並無其制故始制斯儀也彼既不能不於法律外別制法律而又不能於法律中獨捨取法律者誠可怪之甚也亦何其無特操又案五戒中竊盜邪淫妄語是既屬惡但殺生飲酒是猶無記殺生而無罪飲酒而亂是乃屬惡五戒本戒其惡而謂絶無有殺生飲酒不可也功德鎧答宋文帝殺生之義得之楞伽亦云種種放逸酒放逸酒乃不可也又案增一有八關齊法大論分為九而諸部有前後異同亦異部之言然室娶第十五天竺四姓剎利王種治民作政者婆羅門法種作教導民者毗舍商賣首陀農氓為上二種被治且教者剎利猶儒云天子王公大夫士也婆羅門猶儒云司徒鄉之儒師也治之者王公教之者司徒猶此方佛法王法並稱而天台統佛法者也婆羅門法七歲以上在家學問十五以上受婆羅門法遊方學問至年四十恐家嗣斷絶歸娶妻室至年五十入山修道麟記婆羅門世世相承以道學為業或在家或出家多恃己道術我慢人也肇師佛亦作教導民者乃一種婆羅門出家而無妻者已是竺土儒師之習然獨教人者而無室娶非使闔國人皆無妻無嗣也律云父母不聽不許出家是可見已故迦文初有室娶者亦是已何況迦文本剎利王種乎然而佛子多忌迦文有妻息也或云瞿夷乃耶輸也或云善星堂弟之子然而三夫人之目已有明文出於五夢佛本行十二遊三經善星比丘佛菩薩時子出於涅槃經是可見已又大善權經云何故菩薩而有室娶菩薩無欲所以示現妻息防人懷疑菩薩非男斯黃門耳故納瞿夷釋氏之女生羅云於天變沒化生不由父母合會而育又是菩薩本願所致吁是說之幻也如謂吾未知道時且隨世法而娶妻焉則可也而云防人疑為黃門何其陋之甚也又云不由合會是非鬼則怪可笑已涅槃經亦云迦葉問若佛已度煩惱海何緣復納耶輸陀羅生羅睺羅佛告迦葉我於無量劫捨離如是五欲但為隨世間法故示如是相是嫌於其佛久劫既成道而復有室娶故亦幻其說以合之其實假說也又案汝有子使出家閲是文未出家時如無子者却後六年生之瑞應普曜及成道日生是亦無久曠在胎之理意者佛之妻息有五年樂行之間有之者以解之則無難矣又案佛子甚疾女身是本出於揉俗竺之俗甚貴女子司馬遷史記云自宛以西至安息貴女子女子所言大夫乃決正今南蠻俗尚然紅毛闔國皆贅壻以女子為主意者竺亦應然且也經說中所載取母氏姓字為號者多如富蘭那迦葉末加黎拘賖黎皆是其他甚多肇師亦云天竺多以母名名子是也且也正法念經說四種恩一者母二者父三者如來四者說法法師是先計以母觀經亦云劫初已來有諸惡王貪國位故殺害其父一萬八千未嘗聞有無道害母是知國俗貴母亦勝於父吾以是為竺之俗甚貴女子也故佛出而斥之甚則至云菩薩離女身不知佛性名為女人是皆有為之言欲為男子吐氣者也然而其實物有凸凹人有男女天地自然之理也人之在天地間亦何獨疾乎女身又佛戒淫者戒其有邪淫羅漢欲也是則以在家言之其僧伽而無妻室者梵行多由此以敗也故儒家言亦云目不見女色荀子是則此已故無於心而有羅漢欲則何疾乎其有妻室故佛亦云狂者不犯五分律汝既無心云何言犯淨諸業障經是則此已然而又云諸比丘等如世俗人嫁娶行媒於大衆中毀謗毗尼是為法滅之相摩耶經若有沙門一其心念不顧聲色是吾弟子隨順教者雜含是則迦文之意獨欲僧伽而無妻室僧伽而無妻室者謂之能守迦文之意然而後世往往有梵嫂之目者是法滅已又嚮閲楞嚴及觀世音陀羅尼經俱有咒以解犯欲及五辛後世有梵嫂者蓋皆持此肉食第十六佛戒殺遠肉者猶如儒然凡有血氣之屬君子弗親踐禹薄飲食惡旨酒此則是已故十誦律有三淨肉涅槃有九淨肉皆開食之楞伽亦云我有時說遮五種肉或制十種可見食肉制有取捨獨開淨肉是其本也後來戒之益益嚴楞伽云縛象與大雲央掘利魔羅皆經名及此楞伽經我悉制斷肉是知從前契經亦有開之者涅槃亦云從今日始不聽聲聞弟子食肉是知有宗開食肉楞伽所列十七緣多在疾其臭穢獨在其第一則云一切衆生從本以來展轉因緣嘗為六親以親想故不應食肉楞嚴亦云以人食羊羊死為人人死為羊明教師亦承此意云人食物物食人昔相負而今相償業之致然謂物自然者天何頗也又云視今牛羊唯恐其昔之父母精神之所來也戒於殺不使暴一微物篤於懷親也嗚呼甚矣哉其惑於說也以人食物為天之頗則穀菜亦非物乎如以有智別之佛何頗也父母或為牛羊則獨不為穀菜乎外道婆吒計云十方草木皆有情意與人無異草木為人人死還成十方草木是亦何知其非然楞嚴亦云清淨比丘及諸菩薩於岐路行不踢生草況以手拔莊嚴論亦述其比丘為草被縛恐犯戒不得挽絶吁穀菜亦豈非草乎今不得踢且拔矣而又得食矣是何無特操今開食穀菜而獨遮肉吁佛菩薩亦何偏頗故知佛禁肉食意不在斯又報應經云七衆不得食肉葷辛有病開是豈為有病而食則肉亦不為父母故開之乎是不通之論也故知佛禁肉食意不在斯楞伽云令修行者慈心不生故不應食肉令諸咒術不成就故不應食肉令口氣臭故不應食肉亦有此理然而佛戒肉者意本在殺生也戒殺生者傷於仁慈也楞伽不知出於此徒說十七緣抑抑亦末也楞嚴云當斷世間五種辛菜是五種辛熟食發淫生啖增恚佛疾五辛意者是真也有宗第十七大論云佛後百年阿輸迦王作般闍于瑟大會諸大法師論議異故有別部名字是言大天乖諍之事先是佛法一味和合未有異執其始有異執者實佛後百十六年也爾後二百年乃至四百年各各分別為二十一部五百年又為五百部是皆小乘三藏學者以有為宗者而此時未有大乘之言其始有大乘之言者實佛後五百年也大論云佛法過五百歲後各各分別有五百部從是以來以求諸法決定故自執其法不知佛為解脫故說法而堅著語言故聞般若諸法畢竟空如刀傷心又諸大乘經所謂五百歲之語皆可見而律則分為五部大集經所列可見曇無德法密薩婆多一切有迦葉遺數論彌沙塞不著有無觀婆蹉富羅犢子摩訶僧祇大衆是也經云廣博遍覽五部經書名摩訶僧祇是所謂兼部遍合五部兼合之者大集作者自命也然而後世不知之誤以犢子律本為僧祇律本矣僧祇兼部以五部律為其所學豈別有律本乎法顯將來僧祇律乃婆蹉富羅律命以僧祇者誤矣此誤本出於遺教三昧經三昧經所列曇無屈多迦薩婆多迦葉遺彌沙塞摩訶僧祇是也是有摩訶僧祇而無婆蹉富羅意者後世矞宇之徒一時誤見大集而綴緝之然耳且其以五部為既在佛世者亦其妄可知又如其文殊問經及部執宗輪十八部三論皆列部執或為十八部或為二十部或為二十一部其命名次序年數亦皆有異皆異部名字各各相傳之說不必求其開會可也後世不知之種種牽強必求合之又或以二十一部為譯之失者可謂固矣又如其三藏流傳或就五部律分十八部者亦一部所傳不怪其異又如其以五分律出於優婆毱多五弟子者亦恐不必然案婆蹉富羅乃犢子大論云佛在世時舍利弗解佛語故作阿毗曇後犢子道人等讀誦乃至今名為舍利弗阿毗曇真諦亦云羅怙羅是舍利弗弟子可住子是羅怙羅弟子弘舍利弗阿毗曇此部可住子之弟子以是推之犢子是舍利弗之流已薩婆多是迦多衍尼子之流曇無德是目連弟子真諦說可徵彌沙塞不著有無乃車匿之流迦葉遺乃數論皆各別有當是亦未可信矣空有第十八空有之說久矣迦文之時未之有也何也是乏於實理也其為有之者亦託之也小乘二十部皆以有為宗大乘文殊之徒作般若以空為宗深密法鼓法華氏之徒皆以不空實相為宗摩訶迦旃延之徒則作蜫勒論以亦空亦有為宗車匿之徒則作離有無經以非空非有為宗此二宗不傳於漢空有之說蓋至此而極矣其實皆乏于實理諸家互言所無以相壓已大論云惡口車匿如心濡伏者應教那陀迦旃延經即可得道又云摩訶迦旃延佛在世時解佛語作蜫勒秦言篋藏乃至今傳於南天竺又云摩訶迦旃延分別修多羅第一以是觀之蓋亦一部之魁也其不傳於漢可惜大論又云方廣道人亦以空為宗可見空有之說諸家仍此然而是皆乏於實理何以謂之乏於實理譬之儒家有性之說世子云性有善有惡告子云性無善無不善孟子云性善荀子云性惡楊子云性善惡混韓子云性有三品蘇子云性未有善惡性善惡之說蓋亦至此而極矣然而其實皆空言也何也苟於其身為善則可亦何擇乎性之善惡苟於其心無惡則可亦何察乎理之空有徒以是說互相喧豗者事皆屬於無用故曰其實乏於實理性相近也習相遠也是真孔子之說性善惡此時未之有也諸惡莫作衆善奉行自淨其意是諸佛教是真迦文之教理空有此時未之有也是事誠乎相類足以譬焉又案般若空言法華不空固異其歸然而龍樹作大論以解般若云實般若波羅密名三世諸佛母能示一切法實法而又命華嚴以不共般若是則合異宗其實失之然而其作中論以明八不誠法性所宗道法加上之極也法性乃清辨所始智光所述全宗般若空言者也三藏傳云無著夜升覩史陀天於慈氏所受瑜伽師地論莊嚴大乘論中邊分別論晝則下天為衆說法是高尚其事云爾其實瑜伽莊嚴諸論皆無著親造非託之慈氏則人不信也呂子博志篇云孔丘墨翟晝日諷誦習業夜親見文王周公旦而問焉是事亦相類其意全承法華楞伽深密而述不空唯識之理名此為法相宗亦各各立一家而相爭者也禮師云並是有相無相云者是盡染礙非如太虛空無一物嶽師云無相不相小乘猶太虛無生理大乘猶明鏡具像或云三千即空假中或云三千唯假何謂空中辨爭不一要皆六龍之舞已余嘗蔽之曰一家稱空謂實皆空一家稱不空棄之無空其實特立言以相拗已其爭色具可否者亦然何則棄色無空棄空無色山川樓閣本空中物亦無此物空無所在謂之空可也謂之不空可也空不空皆人所命大道泛焉如大論云如無名指亦長亦短觀中指則短觀小指則長長短皆實有說無說亦如此是足以解之余又嘗蔽之曰空有之說久矣皆非佛意而皆有理不妨佛意佛說內外中間之言遂即入定時有五百羅漢各釋此言佛出定後同問世尊誰當佛意佛言並非我意又白佛言既不當佛意將無得罪佛言雖非我意各順正理堪為正教有福無罪此事出於成實論此則似之大論亦云問曰上種種人說般若波羅密何者為實答曰有人言各各有理皆是實如經說五百比丘各各說二邊及中道義佛言皆有理以是觀之此事本經說然而不知是何經說出定之義實出於此南三北七第十九菩提留支之立一音教其言曰如來一圓音教衆生隨根異解是如無害者然然而見其八年說法華及利根人於般若入法界等語亦為法華文所誤者已又如誕遠二師立漸頓二教光統律師立三種教大衍立四宗教護身立五種教耆闍立六宗教南嶽天台立四教敏法師立二教雲法師立四乘教玄奘三藏立三種教法藏師立五教皆難于其諸經異撰各各拂戾乃致此有差異也其原皆起於法華年數之說故曰古今十大德皆為法華轉是之謂也天台大師信法華真實之語以法華為經中一王以建其所謂四教誠衆教之選也又法藏國師信華嚴二七託高之說以華嚴為經中一王復出一層立其宗旨亦誠衆教之選也而此二家其有於諸藏不合者天台則立通別之言法藏則立生熟之言以合之異誠如密如者然蓋天台解云不定部帙但二酥中三乘共學者為通唯為菩薩二乘不聞為別今就求之以吾說則皆錯然亦何必用乎通別之解今且試舉之大品有十地者是別立名以語三乘非以語通也三獸渡河是合德王品師子吼品以立之本非有此義佛說實相有三種聲聞法大乘辟支佛中論觀法品是但言四諦十二因緣六度亦非別有此說大品云十地如佛楞伽云遠行善慧法雲地是佛種性餘是悉二乘種性華嚴仁王却為菩薩之事亦異部名字然何必和會以是解之吾見其有塞也又法藏解云衆生根性不定或見佛始終唯說小乘或見佛初說小乘後轉大乘或見佛初說小乘中說空教後說不空或見言說之教猶非究竟佛初後不說一字或見佛始終唯說三乘或見三乘之法皆依一乘教起以屬之其所謂華嚴別教者亦不得已之說也以余試論之亦何足以概衆教為說是其說以衆生根性不定故佛所說則同而所見異也然而其所說則同而所見異是在么麼事物一二疑似之際固當然矣其初說小乘後轉大乘中說空教後說不空等乃世尊如來轉法輪天下大事無此為大而今諸弟子同在聽席誤其見聞者誠可怪也如或謂云衆生根性不定故佛為說法亦有差別猶之可也亦不知出於此而徒云云者見其惑也且其三乘根性定者見佛從初即說三乘云者最難為說是為約一人說之無量衆生不得羅漢果又為約多人說之固不與小乘者異其實至此而窮古人既論之何況前後差別亦絶不如此乎禪家祖承第二十迦葉一阿難二商那和修三末田地四毱多五提多迦六彌遮迦七難提八密多九脅比丘十夜奢十一馬鳴十二摩羅十三龍樹十四提婆十五羅睺十六僧佉十七耶舍十八鳩摩羅十九闍夜多草槃馱草一摩拏羅草二鶴勒那草三師子草四是付法藏經所載次序也迦葉一阿難二優波掬多三尸羅難陀四青蓮華眼五牛口六寶天七馬鳴八龍樹九是摩耶經所載次序也迦葉一阿難二末田地三舍那婆私四優婆笈多五是舍利弗問經所載次序也又禪經亦載九人而名不同為第八達摩多羅第九般若密多而僧祐三藏記載傳律祖承第五十三人亦為達摩多羅是皆異部相傳之說不足取信者也唐僧智矩作寶林傳載所謂二十八祖迦葉一阿難二商那和修三優波毱多四提多迦五彌遮迦六婆須密七佛陀難提八伏馱密多九脅十富那夜奢十一馬鳴十二迦毗摩羅十三龍樹十四迦那提婆十五羅睺羅多十六僧伽難提十七伽耶舍多十八鳩摩羅多十九闍夜多草婆修盤頭草一摩拏羅草二鶴勒那草三師子草四婆舍斯多草五不如密多草六般若多羅草七菩提達磨草八是其次序也然是契經所未經見古人或謂以為智矩僞作婆舍斯多不如密多皆他處所出所謂買帽相頭者達摩多羅般若密多只許老胡知不許老胡會亦極為顢頇要亦異部所傳之說未足取信者也然以法言之心則吾心也法則吾法也以吾心而證吾法何用彼祖承雖己自為七佛誰復咎之然而天下滔滔誇其祖承者皆是也以吾觀菩提達磨決非衒人以祖承者之徒爾後亦云吾為法來非為衣來雖此徒亦決非其徒禪家制祖承者豈無非後世昉於知矩乎後世儒氏亦不知之愧其己獨無之乃云堯以是傳之舜舜以是傳之禹以至孔子孟軻是其道統之傳所出可笑獨菅為長不答圓爾可謂一默雷轟不亦奇乎吾聞之林氏中甫曰達磨入支那者其意蓋謂竺土佛法既屬像季事皆萎薾無復可與語者惟支那絶遠教法未及事猶屬草昧宜於此時誘以吾道直示之旨亦應有了解者乃決其意而來也然其初見梁武帝乃問以功德及與聯對於是磨乃謂亦猶吾竺土佛法也非帝不契乃磨不契即輒拂衣而去於少林九年壁觀以終其人或云振且機熟是大不然以基觀之是或然矣其言於帝而帝不契終為人被毒而死是何在其為機熟分明是後徒飾辭嗚呼達磨為其道法遠入遼絶之地欲以播之其言至高無復人信受者而終死於極惡闡提小人之手吾以達磨為天下古今一人可憐者也然而後來其道大興天下衲僧跳不出泥裏洗土塊直至與迦文相抗衡亦固其所也其徒所謂機熟以是云爾然以命之其初者非也吾以達磨為天下古今一人可憐者也林氏中甫名師良先子之友也今現在曼陀羅氏第二十一曼陀羅氏持字輪本出於大品華嚴亦依之所說俱四十二字涅槃文殊問金剛頂亦依之是則五十字而大日經則四十九字其義或同或異亦異部名字然曼陀羅氏云般若華嚴所說末也涅槃雖是本母但說淺略義是曼陀羅氏自重云爾曼陀羅氏全以字輪為專門故字輪說遂為曼陀羅氏之有其實本出於大品而諸部皆有其以阿字為一切種子者一也何也皆託之本不生也又守護經以唵字為一切陀羅尼首者亦曼陀羅氏一部不必和會可也又如胎藏金剛兩部曼陀羅各各異其次序方面亦異部之執然胎藏現圖善無畏於金粟塔下所寫金剛現圖龍猛開塔時所現亦各各張具傳承云爾後世學者合之者非也又案龍猛鐵塔中所得者金剛頂經也事見於不空義訣後世學者崇奉之至并大日經為塔中藏者非也又案毗盧舍那之號出於華嚴本讚佛之言合以大日者曼陀羅氏新意也又案祕密之名本讚法之言有宗以毗尼為祕藏法華有如來祕密神通之力涅槃有祕密藏如來密語亦各各自珍愛之言大日經云勝上大乘句心繞生之相諸佛大祕密諸部皆有祕密而獨以祕密為宗者曼陀羅氏也以他為小密大密自居者曼陀羅氏專門也又案龍猛龍智不空慧果是其相承次序所經僅五六世而其年紀則千有餘年蓋其說云玄奘法師見龍智於南印磔迦國菴羅林中時年七百餘歲弘法大師入唐時猶現在是甚奇怪豈有所託乎雖然天地之際何事不有亦何怪其相承少而年紀多也救世大菩薩壽量久遠雖與天地共終始亦可亦何怪其七百餘歲又案曼陀羅氏之業全在觀相禁咒存竺土風者唯曼陀羅氏已漢夙失其傳此方獨傳之不亦奇乎其人云大日本國無有乎爾則亦無有乎爾又案樓閣經云真言是諸佛之母成佛種子若無真言終不能成無上正覺又三藏經盡從陀羅尼所出大乘莊嚴寶王經云諸佛亦求神咒何況凡夫而不持誦耶六度經云契經如乳調伏如酪對法如生蘇般若如熟蘇總持門如醍醐十住論云以六度等為自力其功遲念佛等為他力其功疾真言中密具自他二力是皆曼陀羅氏自重之說也外道第二十二外道之數蓋九十六大論云九十六種外道一時和合欲共佛諍議薩婆多律云外道六師各出十五種合九十六是也大集經則云於三寶中心得敬信勝於一切九十五道分別功德論亦云九十六道之中佛道以為其最是合佛為九十六亦異部之言然楞伽經又有百八部邪見其目俱不詳富蘭那迦葉末伽黎拘賒黎子刪闍夜毗羅胝子阿耆多翅舍欽婆羅迦羅鳩馱迦旃延尼犍陀若提子是維摩經所載外道六師也自餓投淵赴火自坐寂默牛狗是涅槃經所載六苦行外道也我者衆者壽者命者生者養者衆數者人者知者見者作者使作者起者使起者受者使受者是大論所載十六知見也因中有果論從緣顯了論去來實有論計我實有論諸法皆常論諸因宿作論自在等因論害為正法論諸法邊無邊等論不死矯亂論諸法無因論七事斷滅論因果皆空論妄計最勝論妄計清淨論妄計吉論是瑜伽論所載十六異論也時地等變化瑜伽我建立淨不建立無淨自在天流出時尊貴自然內我人量遍嚴壽者補特伽羅識阿賴耶知者見者能執所執內知外知社恆梵若摩奴闍摩納婆常定生聲非聲是大日經所載三十種外道也小乘外道論師方論師風仙韋陀伊賒那倮形毗世苦行女人眷屬行苦行淨眼摩陀羅尼犍僧佉魔醯首羅無因時服水口力本生安茶是外道小乘涅槃論所載二十種小乘外道也此皆其梗概而未及填九十六之數也其所謂四圍陀典經書不傳其人亦不入於漢其說之是與非今豈得而詳之乎法顯傳云此中國有九十六種外道皆知今世各各有徒衆亦皆乞食但不持鉢又云調達亦有衆在供養過去三佛唯不供養釋迦文佛又云羯羅拏國邪正兼事別有三寺不食乳酪是調達部僧也是可見外道亦傳至於後如外道而如佛所言則其傳至於後亦豈至於此乎迦毗羅外道造金七十論立二十五諦其書今具存亦立一家言者可謂傑矣秦時獅子國婆羅門馱其書至關中乞辨論釋子道融以方便伏之而其道熄矣惜也其說如何今豈必保其說之不是乎唐時波斯國蘇魯支傳末尼大祆教拂多誕傳二宗教者此其矞宇者以其矞宇者概其他不可之甚也然今以佛書所言推之外道之歸蓋不過生天而其行亦不出苦樂二行曰大梵天能生萬物之本違之則受生死順之則得解脫曰無想天真實涅槃修無想定生於此曰五淨居有魔雞首羅天王處是為造化之本歸之則得解脫是其說生天者之為也又天龍八部及水火等皆外道所事如普門品云應以天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身得度者即皆現之而為說法及迦葉事火龍皆可見大論又述外道之行云以灰塗身裸形無恥以人髑髏盛糞而食拔頭髮臥刺上倒懸熏鼻冬則入水夏則火炙食果菜草根牛屎稊稗水衣一日乃至二月一食或吸風飲水蓋主意行作亦不過如此於是迦文乃出之一層斥以生死曰上二界死時退時生大懊惱甚於下界譬如極處墮摧碎爛大論又如其以大梵為逝官自在天王為邪魔及說諸天勸請其實皆破之之說故大論云外道事梵天梵天自請則外道心伏又云衆生常識梵天以為祖父故故說梵天是也又如其六年從苦行者亦以伏外道心也故大論云譬如釋迦牟尼佛若先不行六年苦行而呵言非道者無人信受故自行苦行過於餘人西域記亦云太子思惟至理為伏苦行外道節麻米以支身六年是也因果經則云太子身念言我今修於苦行垂滿六年若以羸身而取道當言自餓是涅槃因當受食然後成道是可見迦文行苦樂二行者以伏外道心也而其說所謂中道者復出之一層也中含云有二種行五欲苦行離此二邊是名中道是也又案道家有西升化胡之經言老子西出關化胡俗以佛為侍者等事是無論其意全在上佛氏而為僞造也然老子西入胡而播其教者則蓋有之史記老子傳云西至關著書而去莫知其所終漢書襄楷傳云老子入夷狄為浮屠之教事詳於說蔽以此推之意者老子亦外道中之一也自然外道豈是乎亦豈無非以佛為侍者乎佛出朝代第二十三佛出朝代年紀杳邈尼羅蔽荼亦無之傳諸說蓋紛紛如也西域記云自佛涅槃諸部異議或云已過九百未滿千年當赧王時或云一千二百餘年當靈王時或云一千三百餘年惠王或云一千五百餘年平王鷲嶺聖賢録云說佛生時凡有八別一夏桀時二商末武乙時法顯議三西周昭王時法本內傳四穆王時五東周平王時王玄策六桓王時道安七莊王時王簡栖八貞定王二年甲戌趙伯休衆聖點記以基觀之諸說既無依憑皆未可信但趙伯休衆聖點記足以徵焉是或其真也隱士趙伯休於廬山遇律師弘度得衆聖點記云佛滅後優婆離結集律藏以其年七月十五日自恣竟於律藏前便下一點年年如是波離以後師師相付至僧伽跋陀羅將律藏至廣州當齊永明七年七月十五日自恣竟即下一點其年凡得九百七十五點伯休問曰永明七年後云何不點度曰已前皆得道人手自下點吾徒凡夫止可奉持耳伯休因點記推至大同初凡一千二十年是獨有依憑可以為證且也大抵佛氏之意皆欲迦文之出先於孔老二子而此却後之幾百年益益足以信之冡墓因緣經云閻浮提中有振旦國我遣三聖在中化導人民清淨法行經云光淨菩薩彼稱孔子迦葉菩薩彼稱老子月光菩薩彼稱顏回本起經則云末法一萬年月光菩薩出振旦國說法五十二年不合是或其本說是皆漢土頗類所假託劉學士平心録非之者得矣是本出於法琳破邪論劉引以非之意是諸經皆法琳以後假託吾獨以趙伯休點記為正又如其周書異記所載蘇由扈多問答數事者皆不經造言懸空所出皆不足證或云周書不書避異也輔教可笑獨其室利房來化秦皇者是有影似史記五行志云秦皇草六年有大人長五丈皆夷狄服凡十二人見於臨洮是無他長狄喬如鴻池送璧之類已而云十八異僧如秦輔教亦可笑又列子載孔子之語云西方有聖人曰佛今所傳列子是唐後人綴緝他書所作別有考故法苑珠林亦以周書異記引之可見是取之已又今無曰佛二字蓋作者忌而省之凡如此類甚多皆不足取又案漢書霍去病傳收休屠祭天金人顏師古云今佛像是也佛氏多引以證佛之入漢實先於明帝然是筏蘇盤豆之像已非佛像也法盈記云竺土祠自在天黃金為身頗梨為眼號此天像為筏蘇盤豆是也三教第二十四三教之有爭久矣是何爭也儒者守其名數道者修其衛生佛者離其生死亦各各立其言以說道者也今試蔽之儒之所淫者文佛之所淫者幻而道之以天為宗或謂海外有神仙之居亦以幻進者乃竺土外道之類也其稱道亦最污下固非儒佛之列其經說亦皆後出西升化胡三十六天大羅天帝之居要皆幻而加上於佛者也此方不傳今所不論靜齊劉學士作平心録論三教余執讀之全以幻定其優劣又或問三教優劣於李士謙曰佛日也道月也儒星也時以為至論然是其實無所當吾不解何意何在其為至論此皆小輩何知大道或問佛於龍門王子曰聖人也其教如何曰西方之教也中國則泥是得之矣其中國則泥者何所貴在幻也或問儒於余曰聖人也其教如何曰西方之教也此方則泥此方則泥者何所貴在文也夫言有物道為之分國有俗道為之異儒之教且在此方則泥何況佛之教在西方之西方乎故佛之所淫在幻儒之所淫在文捨此則幾於道矣昔者何承天作達生論詆佛道顏延之復作書折之又僧慧琳著白黑論而宗炳難之是儒佛之爭也至趙宋時歐陽修作本論石讀道作怪說胡寅作崇正辨皆攘斥佛氏時有明教大師契嵩作輔教編答之亦儒佛之爭也吾執護之要亦不過爭其幻與文明教之言云佛之道何外於天下國家但其所出不自吏而張之亦化之理也隱而難見故世不得而盡信又云佛以神道設教感其內是其隱而難見云神道感其內云者皆言因果報應之理已是所謂幻而非佛之真也明教不知之可惜且佛是婆羅門一種掌民之教者猶儒云司徒鄉儒師國家天下乃剎利王種所治竺土之俗然明教今為何外之言是并其俗而不知者亦可惜明教又作調停之說云十善五戒與所謂五常仁義一體聖人為教不同而同於為善天下之教化者善而已矣佛之法非善乎而諸君必排之吾欲諸君為公而不為矜聖人之教善而已矣夫聖人之道正而已矣不必僧不必儒僧儒者迹也古者有聖人焉曰佛曰老曰儒其心則一其迹則異夫一焉者其皆欲人為善者也異焉者分家各各為其教者也天下不可無儒不可無老不可無佛虧一教則損天下之一善道損一善道則天下之惡加多吾謂三教者乃相資而善世也俱在冥數自然人不可得而輒見是其意謂三教皆善道缺一失一善是乃冥數自然吁亦何愚也如以善概之何限三教數十外道數十異端豈皆非善乎其心則一其迹則異獨奈其使人有熒者是可思儒之教人在善佛之教人在善其教人在善者則一也獨奈其使人有淫於幻與文者吁亦是可思已宋真宗亦嘗謂王旦曰三教之設其旨一也大抵皆勸人為善唯識達之士能一貫之滯情偏執於道益益遠是亦調停之說要不足言石門慧洪謁明教塔詩亦云吾道比孔子譬若掌與拳展握故有異要之手則然是亦信明教云爾殊不知幻之與文實有胡越之異明教又見張載二程諸儒有復性之說乃以謂是出於唐李翱復性書復性出於藥山惟儼是諸儒說本與佛氏無異今閲其復性書者其言曰情不作性斯統矣弗慮弗思情則不生情既不生乃為正思是以情屬惡情之不生為復性乃禪那之末說也張程之意殊不然張程之意固不以情屬惡又固不欲情之不生性復於本然情依而善名此為復性也明教眩於其文同以為無異者非也近世如伊藤仁齊亦以為然不啻佛氏儒亦昧於文明教又云韓子以佛法獨盛惡時俗奉不以方雖以書抑之至其道本而韓亦頗推之屏山亦云劉張呂朱皆近代偉人也夢幻死生塵垢富貴皆學聖人而未至者其論佛老也實與而文不與陽擠而陰助蓋有微意存焉是實騙局手段竺土幻變之習皆取法於法華氏者已如韓及劉等而然則是穿窬之盜已何以為儒韓與大顛三書載在本集亦僧伽假託蘇軾論之得矣與孟簡者乃其真也明教又云徒張布施報應以衣食於人知先生之門論德義而計工力乎又云以道報恩以德嗣德雖不娶以資父母雖毀形以濟乎親泰伯豈不虧形乎伯夷叔齊豈不不娶長往乎此二云者明教之言甚確儒固或以疚乎佛氏者非也吾非儒之子非道之子亦非佛之子傍觀乎其云為且私論之然雜第二十五法華經序品云為諸菩薩說大乘經名無量義教菩薩法佛所護念佛說此經已結迦趺坐入於無量義處三昧身心不動是文為既說訖也而下又云今日如來當說大乘經是文為未說訖也一篇中終始齟齬全不成文且也法華經一部終始皆讚佛之言而全無經說之傳固無可名經者法華傳記云法華傳四本皆有增減西方經何限意者竺土別有全文今所佛乃殘篇已故天台大師亦解之云法門綱目大小觀法種種規矩皆所不論以法華前曾委說故故至法華但開示悟入佛之知見授記作佛而已可謂能讀法華者其實失之又案無量義乃法華經一名文句說得之或以無量義經當之者非也何以知之無量義經是法華氏之徒後於華嚴而作者故其說云初說四諦為求聲聞人中於處處演說甚深十二因緣為求辟支佛人次說方等十二部經摩訶般若華嚴海空法華會入佛慧宣說菩薩歷劫修行是其實法華氏上於華嚴而作者此文可見今本皆無法華會入六字者後人所省以信其為法華序其實不是毗奈耶說世尊為四天王說四聖諦先以聖語次以南印度邊國俗語次以蔑戾車語是言佛多能能作諸國語異聽之人皆得其益已又如維摩頌云佛以一音演說法衆生隨類各得解及乃起真圓音一演異類解是言佛之說法實出於一口衆生隨機皆得其益已上言其言語之有異下言其聲音之不殊其義各各有所當也然婆沙解之云云後世學者以分大小者非也如不淨觀是竺土俗然在此方則人不肯佛心無垢如如而來何曾有不淨婆沙正理言之者非也天台學者窘於涅槃云從般若出涅槃不亦云出法華而法華之時不可為衆皆成佛因立前後番五味而曰法華之後更說般若皆調停之說已法華經一部只讚言已而無經說無聲聞無緣覺合佛無之無復所謂藏通別之可名者至他經則有經說之可見故却屬於藏通別是他經之不幸也如金錍論云華嚴之普賢普眼三無差別大集之染淨融通淨名之毛孔舍納皆是圓妙何曾在於藏通別然而未免於此者是有經說而言及小乘也法華不成文但是說後讚是法華氏之幸也法師疏云非般若外別有法華法華般若異名已是微有見然亦非也般若空言法華不空此豈同乎字母大品羅字華嚴作多亦異部名字然說者以譯之誤者非也法華信解品以誘化窮子譬愚衆不可先語大是但張法華以壓他之言非以譬五時也天台學者以其驚愕稱怨合之華嚴如聾如啞然而在初父子相失相見乃無所合是何也凡譬諭之道從容乎為之以成其趣不必糊塗一一取合可也且也如以從前說法皆為方便則先付窮子珍寶庫藏意者亦贋物已以是解之者非也又如二十年之譬亦唯言其曠久相離已非有所合也然後之說者他方遷就以合之可笑已華嚴出現品云一切二乘不聞此經何況受持法界品云舍利弗不樂說不能讚嘆又云如聾如啞是皆自家張其宗之言非為後來低說阿含之地後世合以說之非也法華方便品云唯有一乘法無二亦無三是假二三以張一乘非別有所指天台學者以藏通等解之者非也法華云但為菩薩不為小乘但以一乘道教他諸菩薩無聲聞弟子為此諸佛子說是大乘經聲聞若菩薩皆成佛無疑汝等所行是菩薩道漸漸修學悉當成佛是言其四十餘年所說是但假以馴致之之法非真實成佛之道唯今日所說之法乃是本教菩薩之法而不為二乘設之然二乘亦聞而修之乃得進為菩薩而同歸於成佛也是乃作者厚意然天台學者則謂諸聲聞弟子方等彈訶般若淘汰機緣斯熟法華成果故於此數句有不合者因作味味悟入劣鈍至五味等解以合之皆非也法華譬喻品云我昔從佛聞如是法見諸菩薩受記作佛涅槃長壽品云我初成正覺有諸菩薩亦曾問是義又云我往在耆闍崛山與彌勒共論世諦舍利弗等五百聲聞却不識知何況出世第一義諦大論云從得道夜至泥洹夜常說般若此皆立時者所窘說涅槃者云華嚴七處八會無靈山此經文未度是亦信時云爾又如唐譯楞嚴非一時說約類為部及提謂無所屬瑞應不定大小亦皆然矣方等陀羅尼經有舍衛聲聞記天台學者以方等至於後涅槃經有蓮華藏世界海以華嚴至涅槃後迦留陀夷受記於法華滅度於涅槃以酪教至於後是皆為之窘淨名又有於此大乘已如焦種之文亦不合學者或云方等無說時人心有不可欺者如此淨名居士優婆之魁能證其道亦別立一家同不相下而同趣者亦一家之傑也其妙喜自來云維摩金粟如來云者思惟三昧經發迹經皆後時宗其道者所言大論亦云以毗摩羅詰觀世音為菩薩之上首蓋菩薩之魁也又案維摩經云三轉法輪於大千意是作在深密之後獅子鎧造成實論本屬制多後徒轍僧祇大小兼學擇其善者録之亦立一家言者也天台學者以其有三藏之語斥為小乘者失之楞伽有頓漸之語隋延依以立其二教然是本依地位而說失之賢首以法華屬其終教五教章中引法華以證終教者凡二可見也故清涼受之云法華漸之頓實賢首之意也近世鳳潭師以法華合華嚴以破清涼者失之天台非華嚴曰華嚴不說聲聞作佛及壽量久成華嚴非法華曰華嚴頓之頓法華漸之頓華嚴有菩薩請餘經所無天台答曰法華亦有菩薩請華嚴答曰世主妙嚴品有成道已經不可思議劫要皆爭其幻說者是何有乎道漢明長樂之較試火獨燒道經者幻之勝也是何有乎道又如列子云化人是幻士已非指佛也僧迦極口言之可笑神通與幻有少別然亦幻也付法藏經云夜奢以五指放光馬鳴疑是幻凡幻之法知之則滅而此光轉轉更熾盛蓋佛則求之道而外道求之利養也而其所以幻人者一也是猶漢土之尚文亦有道學詞章之別維摩經云遊戲神通竺土以神通為遊戲亦猶漢云游於藝般若無作品云諸天子言我等於閻浮提見第二法輪轉無量百千天子得無生忍大論解之曰問初說法使人得道是名轉法輪今何以言第二法輪轉若以佛說名為轉法輪者皆是法輪何限第二答初說法名定實一法輪因初轉乃至法盡通名為轉是諸天見是會中多有人見是利益故讚言第二轉法輪初轉法輪八萬諸天得無生法忍阿若憍陳如一人得初道今無量諸天得無生法忍是故說第二法輪今轉法輪似如初轉今案問者之意謂佛說皆一終始無別今獨限第二者何也答者之意謂佛說固無今初之異但第二會利益特多故讚出云爾非有說法之異是乃論之原旨也然後世立時者引此以證鹿苑為初轉般若為第二甚失本意且也以五時當之華嚴乃初轉已又失之矣與諸菩薩授佛記別是大乘中授記近因近果是小乘中授記授記亦幻也而亦大乘上之三多乃三摩呬多之省古人種種解之者皆非也五分律云海有八未曾有十二分教又有未曾有猶今云奇妙者佛本行經六十四書有阿浮多書隋言未曾有蓋今曲筆之類也如數息以十為度出入共數是竺人之義如偏數是漢人之義涅槃名字品十住在十信後釋義品則如例仁王教化品三地斷見受持品四地斷見大論八萬無生忍或作法眼淨一經論中乖戾如此況異部乎本有三佛華嚴有十佛本有六通華嚴有十通本有三明八解脫四無畏三世四諦四辨六度華嚴皆以十立數可謂奇矣又如金七十論立二十五諦分明是上於佛之四諦雖多亦奚以為大經云般涅言不槃者言生不生之義名大涅槃是其本義本以名死而亦名成道猶如莊子以登遐名成道事實相類不生也者其心清淨無一點垢之生也又如阿羅漢為不生亦同義然而當時說者以生死解之故亦有有餘無餘五般等目其實皆非本之真也又如六種般大經婆沙於五種加現般俱舍則以無色般無復一定說而又有嫌於菩薩有生故亦有誓扶習生願生等說其實於此不合大寶積經密迹力士經初成道七日於鹿苑轉法輪廣益三乘衆彌沙塞律普曜經第二七日為提謂說薩婆多律毗婆沙論出曜經第七七日度五人過去因果經三七日度五人法華經同此薩婆多論六七日度五人四分律同此大論五十七日十二由經二年是皆異部名字何必和會普曜經光讚經及普賢菩薩證明功德經十九出家三十成道寶藏經二十五出家三十成道十二由經西域記二十九出家三十五成道梵網經七歲出家空行三昧經二十七得道是皆不勝其異亦何必和會如說佛生云二月或三月四月者是出於三代正朔之異今不可推如其說佛滅云三月或九月者又云十五日或八日者則有說在案四分律云髮半月一剃極長兩指若二月一剃二月者白黑各各有十五日當此間三十日為二月是竺土之俗以十五日為一月三十日為二月十二月一年為二十四月也以推之十五日乃三十日一月之半八日乃十五日一月之半其云十五日或八日者蓋出於此其云八日者真也又以推之今以六月為一年則第七月乃第二年之正月而其三月乃十二月一年之九月其云三月或九月者蓋出於此然是未詳孰是又以推之如其說迦文苦行云六年或十二年者又馬鳴傳云佛在世後三百餘年摩耶經云六百年者又龍樹傳云七百年或云三百年者是亦然矣分明是竺土以六月為一年一年為二年故後來傳譯有此差異在已其他如時分之說不堪紛雜要皆漠然凡如此類皆無用之辨不必求索可也中含福田經有學無學之目家家一種及下向得皆各各異階級婆沙俱舍等皆混之亦諸部異言固不足怪然是同一小乘而其言然學者多至是而窮矣八十老比丘生盡而命盡是其真也其云金剛之體無患大論或云如來方便示現涅槃涅槃或云阿僧祇劫常在靈鷲山法華或云佛壽七百阿僧祇劫楞嚴或云釋迦始終在淨居天者皆異部幻變之說然法華屬纍品云如來餘深法天台解為六方便賢首解為華嚴別教是各各合其說云爾其實非也是作者自高泛爾言之非有所指又如大論云助佛道初門及入佛法之初門亦但自高深云爾曼荼羅氏引以合其初法明道者亦非也淨飯王泥泹經佛躬欲擔棺世界震動普曜經佛踊身虛空不受父王作禮增一經養母大愛道沒佛躬舉床一腳阿難舉一腳盂蘭盆經佛弟子修孝順者應念念中常憶父母乃至七世父母彌沙塞律父母不聽不許出家又或云減衣盂之資以養父母或云世若無佛善事父母善事父母者即是事佛大集或云左肩擔父右肩擔母遍行大地亦不能報恩父母恩重經是迦文之教所重全在孝也然如後世黃檗大義渡事實狂子顛倒地獄之設亦為此曹也大抵漢土佛法多疏於親是本出於折儒家在竺土則殊不然黃檗大義渡事出於正宗贊四分律云佛令諸比丘長幼相次禮拜不應禮拜一切白衣涅槃經亦云出家人不禮敬在家人此云在家者泛乎言之一切白衣亦然梵網經則云出家人法不合禮拜國王父母六親亦不敬事鬼神是益嚴刻至不拜父母而極矣然而梵網又云孝順父母師僧三寶是可見雖梵網之刻亦不能不孝順父母阿彌陀佛土人人皆有身光常明不暗不假日月光明安分晝夜然其經文又有晝夜六時及清旦等語是作者破漏處佛土衆鳥嫌於罪報所生故下說之云是佛變化所作是作者密處道生法師見法顯所翻泥洹經云除一闡提皆有佛性云闡提含生之類何得獨無佛性及後大經至聖行品云一闡提人雖復斷善猶有佛性於是諸師皆為愧服余謂一闡提本無佛性者故為一闡提然極惡者亦豈不可回心乎回心由己非由人也佛性種子實在此何謂無佛性是於言之類轉也又非情數為法性有情數為佛性大論今無此文是其悉皆成佛唯除草木者是其本也其心外無境不隔纖塵者是齊佛於法而張之也是於言之類張也諸法雖相萬乎其要歸於為善苟能守其法而各篤於為善則何擇於彼此佛亦可儒亦可苟為為善者乃一家也何況同宗佛而異其派者乎徒爭其派之有異而無為善者吾不知之矣文亦可幻亦可其志誠在為善則何不可徒淫於幻與文而不在為善者亦吾不知之矣
